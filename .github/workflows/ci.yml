name: Nullherz CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libjack-dev libpipewire-0.3-dev
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --workspace --all-features --exclude nullherz-setup --exclude nullherz-midi --exclude nullherz-backends -- --test-threads=1
